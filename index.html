<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anode Heart Layer Null - デッキ編集</title>
<link rel="stylesheet" href="tailwind.css">
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-sm text-gray-200 h-screen overflow-hidden">

<header class="z-20 bg-indigo-900 text-white px-5 py-2 shadow flex items-center gap-4">
  <span class="font-bold text-base tracking-wide">🃏 Anode Heart Layer Null デッキ編集</span>
  <div id="header-sec-resets" class="ml-auto mr-3 flex items-center gap-1.5"></div>
  <button id="layout-reset" type="button" title="レイアウト(列順・列幅・表示)を保存済み既定に戻す"
    class="hidden bg-amber-700 hover:bg-amber-600 px-2.5 py-0.5 rounded-full text-xs font-semibold">↺ レイアウト</button>
  <button id="view-toggle" type="button" title="リスト表示とグリッド表示を切り替え"
    class="bg-indigo-700 hover:bg-indigo-600 px-2.5 py-0.5 rounded-full text-xs font-semibold">▦ グリッド</button>
  <button id="layout-save" type="button" title="現在のレイアウト(列順・列幅・表示)を既定として保存"
    class="bg-indigo-700 hover:bg-indigo-600 px-2.5 py-0.5 rounded-full text-xs font-semibold">💾 レイアウト</button>
  <button id="help-btn" type="button" title="操作ヘルプ"
    class="bg-indigo-700 hover:bg-indigo-600 px-2.5 py-0.5 rounded-full text-xs font-semibold">❔ 操作ヘルプ</button>
  <span id="count-badge" class="bg-indigo-700 px-3 py-0.5 rounded-full text-xs font-semibold"></span>
</header>

<div class="flex" style="height: calc((100vh / 1.3) - 40px)">

  <!-- デッキ編集ペイン (左サイド・全高) -->
  <div id="deck-pane" class="shrink-0 flex flex-col bg-gray-800 border-r border-gray-700 overflow-hidden" style="width:28rem">
    <div id="deck-toggle-bar" class="shrink-0 flex flex-wrap items-center gap-3 px-3 py-1.5 cursor-pointer select-none bg-gray-700">
      <span id="deck-caret" class="text-xs">▼</span>
      <span class="font-bold text-sm">🛠 デッキ編集</span>
      <span id="deck-total-badge" class="px-2 py-0.5 rounded-full text-xs font-semibold bg-gray-600">0 / 60</span>
      <span id="deck-breakdown" class="text-xs text-gray-400"></span>
      <span id="deck-warning" class="text-xs text-amber-400 font-semibold hidden">⚠ 40枚未満</span>
    </div>
    <div id="deck-body" class="p-3 overflow-auto flex-1 min-h-0">
      <div class="flex items-center gap-3 mb-3 flex-wrap">
        <button id="tama-btn"
          class="flex items-center gap-2 px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 border border-gray-600">
          <img id="tama-icon" class="hidden" style="width:28px;height:28px;object-fit:contain" onerror="this.classList.add('hidden')">
          <span id="tama-label" class="text-xs">タマDNA: 未選択</span>
        </button>
        <div class="flex items-center gap-1 text-xs">
          <span class="text-gray-400">デッキ名:</span>
          <span id="deck-name"
            class="font-semibold text-gray-100 px-2 py-0.5 rounded hover:bg-gray-700 cursor-text border border-transparent hover:border-gray-600"
            title="クリックで編集"></span>
        </div>
        <label class="flex items-center gap-1.5 text-xs cursor-pointer select-none ml-4"
          title="ONの場合、デッキに入れられないカード(デッキ外・NPC限定)を追加できません">
          <input type="checkbox" id="deck-restrict-flag" class="rounded">
          <span class="text-gray-300">デッキ外カードは追加しない</span>
        </label>
        <div class="ml-auto flex gap-2">
          <button id="deck-import" class="px-2 py-1 rounded text-xs bg-gray-700 hover:bg-gray-600 border border-gray-600">📥 読込</button>
          <button id="deck-export" class="px-2 py-1 rounded text-xs bg-indigo-700 hover:bg-indigo-600 text-white">📤 書出</button>
          <button id="deck-clear" class="px-2 py-1 rounded text-xs bg-red-900 hover:bg-red-800 text-white" title="全クリア">🗑</button>
        </div>
      </div>
      <div id="deck-grid" class="flex flex-row flex-wrap gap-2.5 items-center"></div>
      <input type="file" id="deck-file-input" accept=".txt,.json,application/json" class="hidden">
    </div>
    <!-- カードプレビュー (下部固定) -->
    <div id="card-preview" class="shrink-0">
      <p class="preview-empty">カードにマウスを乗せると詳細を表示</p>
    </div>
  </div>

  <!-- メイン: 検索結果カードプール -->
  <main class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
    <div id="table-wrap" class="flex-1 min-w-0 overflow-auto rounded-lg shadow"></div>
  </main>

  <!-- サイドバー (右) -->
  <aside class="w-72 shrink-0 bg-gray-800 border-l border-gray-700 overflow-y-auto p-4 flex flex-col gap-5">

    <!-- キーワード -->
    <div>
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">キーワード</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="q" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="q" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="relative">
        <input id="q" type="search" placeholder="名前・効果テキスト…" autocomplete="off"
          class="w-full border border-gray-600 rounded-md pl-2.5 pr-7 py-1.5 text-sm bg-gray-700 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400">
        <div class="absolute right-1 inset-y-0 flex items-center gap-0.5">
          <button id="kw-history-btn" type="button" title="検索履歴"
            class="text-gray-400 hover:text-gray-100 w-5 h-5 flex items-center justify-center rounded text-xs">🕘</button>
        </div>
        <div id="kw-history-list" class="hidden absolute left-0 right-0 mt-1 bg-gray-700 border border-gray-600 rounded-md shadow-lg z-30 max-h-48 overflow-y-auto"></div>
      </div>
      <div class="flex items-center mt-2.5 mb-1 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">検索対象</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="targets" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="targets" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="grid grid-cols-2 gap-y-1 gap-x-2">
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="target-name" class="rounded" checked>
          <span class="text-xs text-gray-300">名前</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="target-id" class="rounded">
          <span class="text-xs text-gray-300">ID</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="target-cost" class="rounded">
          <span class="text-xs text-gray-300">コスト</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="target-effect" class="rounded" checked>
          <span class="text-xs text-gray-300">特性/効果</span>
        </label>
        <label class="flex items-center gap-1.5 cursor-pointer select-none">
          <input type="checkbox" id="target-json" class="rounded">
          <span class="text-xs text-gray-300">JSON</span>
        </label>
      </div>
    </div>

    <!-- カードタイプ -->
    <div>
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">カードタイプ</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="type" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="type" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="flex flex-col gap-1">
        <button id="btn-all"
          class="py-1 rounded text-xs font-bold transition bg-gray-600 text-gray-300">全て</button>
        <div class="grid grid-cols-2 gap-1">
          <button id="btn-tama"
            class="py-1 rounded text-xs font-bold transition bg-indigo-600 text-white">タマ</button>
          <button id="btn-appli"
            class="py-1 rounded text-xs font-bold transition bg-gray-600 text-gray-300">アプリ</button>
          <button id="btn-virus"
            class="py-1 rounded text-xs font-bold transition bg-gray-600 text-gray-300">ウイルス</button>
          <button id="btn-patch"
            class="py-1 rounded text-xs font-bold transition bg-gray-600 text-gray-300">パッチ</button>
        </div>
      </div>
    </div>

    <!-- レベル -->
    <div id="lv-section">
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">レベル</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="lv" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="lv" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="flex gap-1">
        <button id="lv-all" class="flex-1 py-1 rounded text-xs font-semibold bg-indigo-600 text-white transition">全</button>
        <button id="lv-0"   class="flex-1 py-1 rounded text-xs font-semibold bg-gray-600 text-gray-300 transition">?</button>
        <button id="lv-1"   class="flex-1 py-1 rounded text-xs font-semibold bg-gray-600 text-gray-300 transition">1</button>
        <button id="lv-2"   class="flex-1 py-1 rounded text-xs font-semibold bg-gray-600 text-gray-300 transition">2</button>
        <button id="lv-3"   class="flex-1 py-1 rounded text-xs font-semibold bg-gray-600 text-gray-300 transition">3</button>
        <button id="lv-4"   class="flex-1 py-1 rounded text-xs font-semibold bg-gray-600 text-gray-300 transition">4</button>
      </div>
    </div>

    <!-- 属性 -->
    <div>
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">属性</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="attrs" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="attrs" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="border border-gray-600 rounded-md bg-gray-700 p-1">
        <div id="attr-list" class="flex flex-col gap-0.5"></div>
      </div>
      <label class="flex items-center gap-2 mt-1.5 cursor-pointer select-none">
        <input type="checkbox" id="include-dark" class="rounded" checked>
        <span class="text-xs text-gray-300">対応する闇属性を含む</span>
      </label>
    </div>

    <!-- 種族 -->
    <div>
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">種族</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="tribes" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="tribes" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="border border-gray-600 rounded-md bg-gray-700 p-1.5">
        <div id="tribe-list" class="flex flex-wrap justify-center gap-1.5"></div>
      </div>
    </div>

    <!-- カード範囲 -->
    <div class="border-t border-gray-700 pt-3">
      <div class="flex items-center mb-1.5 gap-1">
        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">カード範囲</p>
        <button class="sec-reset hidden ml-auto text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="range" title="このセクションを既定値に戻す">↺</button>
        <button class="sec-save hidden text-gray-500 hover:text-indigo-300 text-xs leading-none px-1" data-sec="range" title="現在の状態を既定値として保存">💾</button>
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" id="show-dex" class="rounded" checked>
          <span class="text-xs text-gray-300">デッキに入れられるカード</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" id="show-spawn" class="rounded" checked>
          <span class="text-xs text-gray-300">合体・アプリなどで出せるカード</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" id="show-npc" class="rounded">
          <span class="text-xs text-gray-300">NPC限定カード</span>
        </label>
      </div>
    </div>

  </aside>


</div>

<!-- タマDNA選択モーダル -->
<div id="tama-modal" class="hidden fixed inset-0 z-[10001] bg-black/60 flex items-center justify-center">
  <div class="bg-gray-800 border border-gray-600 rounded-lg p-4 w-[40rem] max-w-[90vw] max-h-[80vh] overflow-auto">
    <div class="flex items-center mb-3">
      <span class="font-bold">タマDNAを選択</span>
      <button id="tama-close" class="ml-auto text-gray-400 hover:text-gray-100 text-lg leading-none">×</button>
    </div>
    <div id="tama-grid" class="grid grid-cols-6 gap-2"></div>
    <!-- ホバー中のタマDNAの説明 (色付き) -->
    <div id="tama-desc-panel" class="mt-3 pt-3 border-t border-gray-700 min-h-[4.5rem]">
      <div id="tama-desc-name" class="font-bold text-sm mb-1 text-gray-100"></div>
      <div id="tama-desc-text" class="text-xs leading-relaxed text-gray-300 overflow-y-auto" style="height:2.5rem"></div>
    </div>
  </div>
</div>

<!-- 操作ヘルプモーダル -->
<div id="help-modal" class="hidden fixed inset-0 z-[10001] bg-black/60 flex items-center justify-center">
  <div class="bg-gray-800 border border-gray-600 rounded-lg p-4 w-[36rem] max-w-[90vw] max-h-[80vh] overflow-auto">
    <div class="flex items-center mb-3">
      <span class="font-bold">❔ 操作ヘルプ</span>
      <button id="help-close" class="ml-auto text-gray-400 hover:text-gray-100 text-lg leading-none">×</button>
    </div>
    <table id="help-table" class="w-full text-sm"></table>
  </div>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
